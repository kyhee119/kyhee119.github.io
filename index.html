<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GFS 안성센터 — 업무 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  /* ── 기반 색상 ── */
  --bg:       #f0f2f5;
  --surface:  #ffffff;
  --surface2: #f7f8fa;
  --surface3: #eef0f3;
  --border:   #d1d5db;
  --border2:  #b0b7c3;

  /* ── 텍스트 ── */
  --text:     #111827;
  --text2:    #374151;
  --text3:    #6b7280;
  --text4:    #9ca3af;

  /* ── 포인트 색상 (진하게 — 흰 배경 위에서 잘 보이도록) ── */
  --accent:   #1d4ed8;   /* 파랑 */
  --teal:     #0e7490;   /* 청록 */
  --warn:     #b45309;   /* 주황(진) */
  --warn-bg:  #fef3c7;
  --warn-bd:  #fbbf24;
  --danger:   #b91c1c;   /* 빨강(진) */
  --danger-bg:#fee2e2;
  --danger-bd:#f87171;
  --success:  #065f46;   /* 초록(진) */
  --success-bg:#d1fae5;
  --success-bd:#34d399;
  --purple:   #5b21b6;   /* 보라(진) */
  --purple-bg:#ede9fe;
  --purple-bd:#a78bfa;
  --pink:     #9d174d;   /* 핑크(진) */
  --pink-bg:  #fce7f3;
  --pink-bd:  #f9a8d4;

  /* ── 그림자 ── */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.1),  0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 30px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px;
  min-height:100vh;
}

.sync-btn{
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;
  background:#0f172a;color:#94a3b8;border:1px solid #334155;
  border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .18s;
}
.sync-btn:hover{background:#1e293b;color:#e2e8f0;}
.sync-badge{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  border-radius:5px;padding:4px 10px;border:1px solid;
}
.sync-none{color:#64748b;background:#0f172a;border-color:#334155;}
.sync-ok  {color:#34d399;background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.3);}
.sync-err {color:#f87171;background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);}
.sync-ing {color:#fbbf24;background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);}

/* ══════════════ 헤더 ══════════════ */
.header{
  background:#1e293b;
  padding:11px 22px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:300;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.hl,.hr{display:flex;align-items:center;gap:10px;}
.logo{
  font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;
  color:#38bdf8;letter-spacing:.07em;
}
.logo-sub{font-size:11px;color:#94a3b8;font-weight:300;}
.dvdr{width:1px;height:18px;background:#334155;}
.header-sub{font-size:11px;color:#94a3b8;font-weight:300;}
.date-badge{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:#7dd3fc;background:rgba(56,189,248,.1);
  border:1px solid rgba(56,189,248,.25);border-radius:5px;padding:4px 11px;
}
.kbd{
  font-size:9px;color:#64748b;background:#0f172a;
  border:1px solid #334155;border-radius:4px;padding:3px 9px;
  font-family:'JetBrains Mono',monospace;letter-spacing:.04em;
}
.save-btn{
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;
  background:#2563eb;color:#fff;border:none;border-radius:6px;
  padding:6px 16px;cursor:pointer;transition:all .18s;
  box-shadow:0 2px 6px rgba(37,99,235,.4);
}
.save-btn:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.5);}

/* ══════════════ 그리드 ══════════════ */
.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:16px 18px;
  max-width:1440px;margin:0 auto;
  align-items:start;
}
@media(max-width:860px){.main{grid-template-columns:1fr;}}

/* ══════════════ 패널 공통 ══════════════ */
.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);
  overflow:visible;
  transition:box-shadow .2s;
}
.panel:hover{box-shadow:var(--shadow-md);}

/* 패널 헤더 띠 */
.panel-hd{
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
  display:flex;align-items:center;gap:8px;
  border-radius:10px 10px 0 0;
}
/* 각 패널 헤더 색상 강조선 (좌측) */
.panel-hd.c-todo  {border-left:4px solid var(--purple);}
.panel-hd.c-issue {border-left:4px solid var(--warn-bd);}
.panel-hd.c-cs    {border-left:4px solid var(--danger-bd);}
.panel-hd.c-sched {border-left:4px solid #0ea5e9;}
.panel-hd.c-memo  {border-left:4px solid var(--pink-bd);}

.panel-title{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:700;color:var(--text);flex:1;
}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dp{background:var(--purple);}
.dw{background:var(--warn-bd);}
.dr{background:#ef4444;}
.dt{background:#0ea5e9;}
.dm{background:#ec4899;}

.cnt{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
  background:var(--surface3);color:var(--text2);
  border-radius:10px;padding:1px 9px;border:1px solid var(--border);
}

/* 펄스 */
.pulse-wrap{position:relative;width:10px;height:10px;flex-shrink:0;}
.pulse-wrap i,.pulse-wrap b{position:absolute;inset:0;border-radius:50%;}
.pulse-wrap i{background:#f59e0b;}
.pulse-wrap b{background:transparent;border:1.5px solid #f59e0b;animation:ring 1.8s ease-out infinite;}
@keyframes ring{0%{transform:scale(1);opacity:1}100%{transform:scale(2.8);opacity:0}}

/* 입력 바 */
.qbar{
  display:flex;align-items:center;gap:7px;
  padding:8px 13px;border-bottom:1px solid var(--border);
  background:#fafbfc;
  transition:background .15s,border-color .15s;
}
.qbar:focus-within{background:#f0f7ff;border-bottom-color:#93c5fd;}
.qinput{
  flex:1;background:transparent;border:none;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:13px;outline:none;
}
.qinput::placeholder{color:var(--text4);}
.qsel{
  background:#fff;border:1px solid var(--border);
  color:var(--text2);border-radius:5px;font-size:11px;
  padding:3px 7px;font-family:'Noto Sans KR',sans-serif;
  outline:none;cursor:pointer;
}
.qsel:focus{border-color:#93c5fd;}

/* 패널 바디 */
.panel-body{padding:10px;overflow:visible;flex:1;}
.empty{
  display:flex;align-items:center;justify-content:center;
  height:58px;color:var(--text4);font-size:12px;
  border:1.5px dashed var(--border);border-radius:6px;
}

/* ══════════════ 임박 일정 서브섹션 ══════════════ */
.upcoming-section{
  border-top:2px dashed #fbbf24;
  margin:0 10px 10px;
  padding-top:8px;
}
.upcoming-label{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;color:#92400e;
  margin-bottom:7px;letter-spacing:.03em;
}
.upcoming-label .u-icon{font-size:13px;}
.upcoming-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:6px;margin-bottom:4px;
  border:1.5px solid;
}
.upcoming-item:last-child{margin-bottom:0;}
.upcoming-item.u-day0{background:#fef2f2;border-color:#fca5a5;}
.upcoming-item.u-day1{background:#fff7ed;border-color:#fdba74;}
.upcoming-item.u-day2{background:#fefce8;border-color:#fde047;}
.upcoming-item .u-badge{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:800;
  padding:2px 7px;border-radius:4px;flex-shrink:0;white-space:nowrap;min-width:46px;text-align:center;
}
.u-day0 .u-badge{background:#fee2e2;color:#991b1b;border:1px solid #f87171;}
.u-day1 .u-badge{background:#ffedd5;color:#9a3412;border:1px solid #fb923c;}
.u-day2 .u-badge{background:#fef9c3;color:#854d0e;border:1px solid #fde047;}
.upcoming-item .u-title{
  flex:1;font-size:12.5px;font-weight:600;color:var(--text);
}
.upcoming-item .u-date{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);white-space:nowrap;
}

/* ══════════════ ① 할 일 ══════════════ */
.todo-item{
  display:flex;align-items:flex-start;gap:9px;
  padding:9px 7px;border-bottom:1px solid var(--surface3);
  transition:background .1s;border-radius:6px;
}
.todo-item:last-child{border-bottom:none;}
.todo-item:hover{background:var(--surface2);}

.chk{
  width:17px;height:17px;
  border:2px solid var(--border2);border-radius:4px;
  flex-shrink:0;margin-top:1px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;background:#fff;
}
.chk.on{background:var(--purple);border-color:var(--purple);}
.chk.on::after{content:'✓';font-size:10px;color:#fff;font-weight:800;}
.todo-txt{flex:1;line-height:1.6;font-size:13px;color:var(--text);}
.todo-txt.done{text-decoration:line-through;color:var(--text4);}

.ptag{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px;
}
.t-h{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-bd);}
.t-m{background:var(--warn-bg); color:var(--warn);  border:1px solid var(--warn-bd);}
.t-l{background:var(--surface3);color:var(--text3);border:1px solid var(--border);}

/* ══════════════ ② 특이사항 ══════════════ */
.issue-item{
  display:flex;align-items:center;gap:9px;
  padding:10px 12px;border-radius:0 7px 7px 0;
  border-left:4px solid;margin-bottom:7px;
  transition:box-shadow .15s;
}
.issue-item:last-child{margin-bottom:0;}
.issue-item.age0{border-left-color:#fbbf24;background:#fffbeb;}
.issue-item.age1{border-left-color:#f59e0b;background:#fef3c7;}
.issue-item.age3{border-left-color:#ef4444;background:#fef2f2;}

.issue-item:hover{box-shadow:var(--shadow-sm);}

.issue-txt{flex:1;font-size:13px;font-weight:600;line-height:1.5;color:var(--text);}

.issue-age{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:4px;flex-shrink:0;white-space:nowrap;
}
.age0 .issue-age{color:#92400e;background:#fef3c7;border:1px solid #fbbf24;}
.age1 .issue-age{color:#78350f;background:#fde68a;border:1px solid #f59e0b;}
.age3 .issue-age{color:#991b1b;background:var(--danger-bg);border:1px solid var(--danger-bd);animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}

.issue-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);white-space:nowrap;}

.resolve-btn{
  font-size:11px;font-weight:600;
  background:var(--success-bg);border:1px solid var(--success-bd);
  color:var(--success);border-radius:5px;padding:3px 11px;cursor:pointer;
  white-space:nowrap;font-family:'Noto Sans KR',sans-serif;
  transition:all .15s;flex-shrink:0;
}
.resolve-btn:hover{background:var(--success);color:#fff;border-color:var(--success);}

/* ══════════════ ③ CS ══════════════ */
.cs-item{
  display:flex;align-items:center;gap:9px;
  padding:10px 12px;
  border:1.5px solid var(--border);border-radius:7px;margin-bottom:7px;
  background:#fff;transition:border-color .15s,box-shadow .15s;
}
.cs-item:last-child{margin-bottom:0;}
.cs-item:hover{border-color:#93c5fd;box-shadow:var(--shadow-sm);}

.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pu 2.2s infinite;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.2}}
.sg{background:#10b981;}
.sa{background:#f59e0b;}
.sr{background:#ef4444;}

.cs-txt{flex:1;font-size:13px;font-weight:600;color:var(--text);}

/* ══════════════ ④ 일정 ══════════════ */
.sched-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 7px;border-bottom:1px solid var(--surface3);border-radius:6px;
}
.sched-item:last-child{border-bottom:none;}
.sched-item:hover{background:var(--surface2);}

.dbadge{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;
  padding:4px 9px;border-radius:6px;flex-shrink:0;
  min-width:56px;text-align:center;letter-spacing:.03em;
}
.d0{background:#fef2f2;color:#991b1b;border:2px solid #f87171;}
.d1{background:#fff7ed;color:#9a3412;border:2px solid #fb923c;}
.d3{background:#fffbeb;color:#92400e;border:2px solid #fbbf24;}
.d7{background:#eff6ff;color:#1e40af;border:2px solid #93c5fd;}
.do{background:var(--surface3);color:var(--text3);border:1px solid var(--border);}

.sched-info{flex:1;}
.sched-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.sched-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}

/* ══════════════ ⑤ 메모 ══════════════ */
.memo-item{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:8px;padding:11px 13px;margin-bottom:8px;
  transition:box-shadow .15s,border-color .15s;position:relative;
}
.memo-item:last-child{margin-bottom:0;}
.memo-item:hover{border-color:var(--border2);box-shadow:var(--shadow-sm);}
.memo-item.pin{border-left:4px solid #ec4899;background:var(--pink-bg);}

.memo-txt{
  font-size:13px;line-height:1.7;color:var(--text);
  white-space:pre-wrap;word-break:break-all;
}
.memo-footer{display:flex;align-items:center;gap:7px;margin-top:8px;}
.memo-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}

.pin-btn{
  font-size:11px;background:#fff;border:1px solid var(--border);
  color:var(--text3);border-radius:4px;padding:2px 9px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:all .15s;
}
.pin-btn:hover,.pin-btn.on{color:var(--pink);border-color:var(--pink-bd);background:var(--pink-bg);}

.memo-textarea{
  width:100%;background:transparent;border:none;
  border-bottom:2px solid var(--border);
  color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:13px;line-height:1.65;
  padding:9px 13px;outline:none;resize:none;min-height:64px;
  transition:border-color .15s;
}
.memo-textarea::placeholder{color:var(--text4);}
.memo-textarea:focus{border-bottom-color:#ec4899;}

.memo-add-btn{
  font-size:12px;font-weight:600;
  background:#9d174d;color:#fff;border:none;
  border-radius:5px;padding:5px 14px;cursor:pointer;
  margin:7px 12px;transition:all .18s;
}
.memo-add-btn:hover{background:#831843;}

/* ══════════════ 삭제 버튼 ══════════════ */
.x{
  opacity:0;background:none;border:none;color:var(--text4);
  cursor:pointer;font-size:13px;padding:0 3px;
  transition:opacity .15s,color .15s;flex-shrink:0;
}
.todo-item:hover .x,.issue-item:hover .x,.cs-item:hover .x,
.sched-item:hover .x,.memo-item:hover .x{opacity:1;}
.x:hover{color:#ef4444;}
.memo-item .x{position:absolute;top:9px;right:9px;}

/* ══════════════ 구분선 ══════════════ */
.section-divider{
  display:flex;align-items:center;gap:12px;
  padding:12px 18px 0;max-width:1440px;margin:0 auto;
}
.section-divider span{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  color:var(--text3);letter-spacing:.1em;white-space:nowrap;
}
.section-divider::before,.section-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* ══════════════ 월간 달력 ══════════════ */
.calendar-section{
  max-width:1440px;margin:0 auto;
  padding:0 18px 24px;
}
.cal-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  background:var(--surface);
  border:1px solid var(--border);border-bottom:none;
  border-radius:10px 10px 0 0;
  box-shadow:var(--shadow-sm);
}
.cal-title{
  font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;
  color:var(--text);flex:1;letter-spacing:.03em;
}
.cal-nav{
  background:var(--surface2);border:1.5px solid var(--border);
  color:var(--text2);border-radius:6px;padding:5px 14px;
  cursor:pointer;font-size:13px;font-weight:600;
  transition:all .15s;
}
.cal-nav:hover{background:var(--surface3);border-color:var(--border2);color:var(--text);}
.cal-today-btn{
  background:#eff6ff;border:1.5px solid #93c5fd;
  color:#1d4ed8;border-radius:6px;padding:5px 14px;cursor:pointer;
  font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;
  transition:all .15s;
}
.cal-today-btn:hover{background:#dbeafe;border-color:#60a5fa;}

.cal-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:0 0 10px 10px;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}

.cal-dow{
  padding:9px 4px;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  color:var(--text3);letter-spacing:.08em;
  background:var(--surface2);border-bottom:1.5px solid var(--border);
}
.cal-dow:first-child{color:#b91c1c;}
.cal-dow:last-child{color:#1d4ed8;}

.cal-cell{
  min-height:90px;padding:7px 8px;
  border-right:1px solid var(--surface3);
  border-bottom:1px solid var(--surface3);
  position:relative;transition:background .12s;cursor:default;
  background:#fff;
}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell:hover{background:#f8fafc;}
.cal-cell.other-month{background:#fafafa;}
.cal-cell.other-month .cal-day-num{color:var(--text4);}

.cal-cell.today{background:#eff6ff;}
.cal-cell.today .cal-day-num{
  background:#1d4ed8;color:#fff;font-weight:800;
  border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;
}

.cal-day-num{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
  color:var(--text2);margin-bottom:4px;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
}
.cal-cell:nth-child(7n+1) .cal-day-num{color:#b91c1c;}
.cal-cell:nth-child(7n) .cal-day-num{color:#1e40af;}
.cal-cell.today:nth-child(7n+1) .cal-day-num,
.cal-cell.today:nth-child(7n) .cal-day-num{color:#fff;}

.cal-event{
  font-size:10px;font-weight:600;
  padding:2px 6px;border-radius:3px;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;transition:opacity .1s;
}
.cal-event:hover{opacity:.75;}
.cal-ev-d0{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.cal-ev-d1{background:#fff7ed;color:#9a3412;border:1px solid #fdba74;}
.cal-ev-d3{background:#fef9c3;color:#854d0e;border:1px solid #fde047;}
.cal-ev-d7{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;}
.cal-ev-far{background:var(--surface3);color:var(--text3);border:1px solid var(--border);}

/* ══════════════ 확인 팝업 ══════════════ */
.confirm-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);z-index:500;
  align-items:center;justify-content:center;
  backdrop-filter:blur(3px);
}
.confirm-overlay.open{display:flex;}
.confirm-box{
  background:#fff;border:1px solid var(--border);
  border-radius:12px;padding:26px 28px;width:350px;
  box-shadow:var(--shadow-lg);
}
.confirm-msg{font-size:14px;line-height:1.8;margin-bottom:22px;color:var(--text);}
.confirm-msg strong{color:#b45309;}
.confirm-btns{display:flex;gap:9px;justify-content:flex-end;}
.btn-cancel{
  background:#fff;border:1.5px solid var(--border);color:var(--text2);
  padding:7px 18px;border-radius:6px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;
  transition:all .15s;
}
.btn-cancel:hover{background:var(--surface2);border-color:var(--border2);}
.btn-ok-danger{
  background:#dc2626;border:none;color:#fff;
  padding:7px 18px;border-radius:6px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;
  transition:all .15s;
}
.btn-ok-danger:hover{background:#b91c1c;}
.btn-ok-success{
  background:#059669;border:none;color:#fff;
  padding:7px 18px;border-radius:6px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;
  transition:all .15s;
}
.btn-ok-success:hover{background:#047857;}

/* ══════════════ 토스트 ══════════════ */
.toast{
  position:fixed;bottom:22px;right:22px;
  background:#1e293b;color:#f1f5f9;
  border-radius:8px;padding:11px 18px;font-size:12px;font-weight:500;
  opacity:0;transform:translateY(8px);
  transition:all .22s;z-index:999;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="hl">
    <span class="logo">GFS</span>
    <span class="logo-sub">/ 안성센터</span>
    <div class="dvdr"></div>
    <span class="header-sub">업무 대시보드</span>
  </div>
  <div class="hr">
    <span class="kbd">Shift+N 특이사항 · Shift+T 할일 · Shift+M 메모</span>
    <span id="syncStatus" class="sync-badge sync-none">⚙ Gist 미연결</span>
    <span class="date-badge" id="dateBadge"></span>
    <button class="sync-btn" onclick="openGistSettings()">🔗 Gist 설정</button>
    <button class="save-btn" onclick="saveAll()">💾 저장 · 동기화</button>
  </div>
</div>

<!-- 메인 그리드 -->
<div class="main">

  <!-- ① 오늘 해야 할 일 -->
  <div class="panel">
    <div class="panel-hd c-todo">
      <div class="panel-title">
        <div class="dot dp"></div>① 오늘 해야 할 일
        <span class="cnt" id="todoCnt">0</span>
      </div>
    </div>
    <div class="qbar">
      <input class="qinput" id="todoInput" placeholder="할 일 입력 후 Enter…" onkeydown="qa('todo',event)">
      <select class="qsel" id="todoPri">
        <option value="높음">🔴 높음</option>
        <option value="보통" selected>🟡 보통</option>
        <option value="낮음">⚪ 낮음</option>
      </select>
    </div>
    <div class="panel-body" id="todoList"></div>
    <!-- D-2 이내 임박 일정 자동 표시 -->
    <div id="upcomingSection" style="display:none;">
      <div class="upcoming-section">
        <div class="upcoming-label"><span class="u-icon">📅</span> 임박 일정 (D-2 이내)</div>
        <div id="upcomingList"></div>
      </div>
    </div>
  </div>

  <!-- ② 미해결 특이사항 및 이슈 -->
  <div class="panel" style="border-color:#fbbf24;">
    <div class="panel-hd c-issue" style="background:#fffbeb;border-bottom-color:#fde68a;">
      <div class="panel-title">
        <div class="dot dw"></div>② 미해결 특이사항 및 이슈
        <span class="cnt" id="issueCnt">0</span>
      </div>
      <div class="pulse-wrap" id="issuePulse" style="display:none"><i></i><b></b></div>
    </div>
    <div class="qbar" style="background:#fffdf0;border-bottom-color:#fde68a;">
      <input class="qinput" id="issueInput" placeholder="특이사항 입력 후 Enter — 해결 전까지 계속 표시" onkeydown="qa('issue',event)">
    </div>
    <div class="panel-body" id="issueList"></div>
  </div>

  <!-- ③ 진행 중인 CS / 클레임 -->
  <div class="panel" style="border-color:#fca5a5;">
    <div class="panel-hd c-cs" style="background:#fef2f2;border-bottom-color:#fecaca;">
      <div class="panel-title">
        <div class="dot dr"></div>③ 진행 중인 CS / 클레임
        <span class="cnt" id="csCnt">0</span>
      </div>
    </div>
    <div class="qbar" style="background:#fff8f8;border-bottom-color:#fecaca;">
      <input class="qinput" id="csInput" placeholder="CS 내용 입력 후 Enter…" onkeydown="qa('cs',event)">
      <select class="qsel" id="csStatus">
        <option value="처리중">🟡 처리중</option>
        <option value="확인중">🔵 확인중</option>
        <option value="긴급">🔴 긴급</option>
        <option value="클레임">⚠ 클레임</option>
      </select>
    </div>
    <div class="panel-body" id="csList"></div>
  </div>

  <!-- ④ 다가오는 일정 -->
  <div class="panel" style="border-color:#93c5fd;">
    <div class="panel-hd c-sched" style="background:#eff6ff;border-bottom-color:#bfdbfe;">
      <div class="panel-title">
        <div class="dot dt"></div>④ 다가오는 일정
        <span class="cnt" id="schedCnt">0</span>
      </div>
    </div>
    <div class="qbar" style="background:#f8fbff;border-bottom-color:#bfdbfe;">
      <input class="qinput" id="schedInput" placeholder="일정명 입력 후 Enter…" onkeydown="qa('sched',event)" style="flex:2">
      <input type="date" class="qsel" id="schedDate" style="font-family:'JetBrains Mono',monospace;font-size:11px;">
    </div>
    <div class="panel-body" id="schedList"></div>
  </div>

  <!-- ⑤ 메모 -->
  <div class="panel" style="grid-column:1/-1;border-color:var(--pink-bd);">
    <div class="panel-hd c-memo" style="background:var(--pink-bg);border-bottom-color:#fbcfe8;">
      <div class="panel-title">
        <div class="dot dm"></div>⑤ 메모
        <span class="cnt" id="memoCnt">0</span>
      </div>
    </div>
    <div class="qbar" style="background:#fff8fc;border-bottom-color:#fbcfe8;align-items:flex-start;padding-top:7px;padding-bottom:0;flex-direction:column;gap:0;">
      <textarea class="memo-textarea" id="memoInput" placeholder="메모 내용 입력 (Shift+Enter 줄바꿈, Enter 저장)…" onkeydown="memoKey(event)" rows="2"></textarea>
      <div style="display:flex;align-items:center;gap:9px;padding:6px 12px 8px;">
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:var(--text2);font-weight:500;">
          <input type="checkbox" id="memoPin" style="accent-color:#ec4899;width:14px;height:14px;"> 📌 고정 메모
        </label>
        <button class="memo-add-btn" onclick="addMemo()">+ 메모 저장</button>
      </div>
    </div>
    <div class="panel-body" id="memoList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:9px;"></div>
  </div>

</div>

<!-- 구분선 -->
<div class="section-divider">
  <span>MONTHLY CALENDAR</span>
</div>

<!-- 월간 달력 -->
<div class="calendar-section">
  <div class="cal-header">
    <button class="cal-nav" onclick="calMove(-1)">◀</button>
    <div class="cal-title" id="calTitle"></div>
    <button class="cal-today-btn" onclick="calGoToday()">오늘로</button>
    <button class="cal-nav" onclick="calMove(1)">▶</button>
  </div>
  <div class="cal-wrap">
    <div class="cal-grid">
      <div class="cal-dow">SUN</div><div class="cal-dow">MON</div>
      <div class="cal-dow">TUE</div><div class="cal-dow">WED</div>
      <div class="cal-dow">THU</div><div class="cal-dow">FRI</div>
      <div class="cal-dow">SAT</div>
    </div>
    <div class="cal-grid" id="calBody"></div>
  </div>
</div>

<!-- Gist 설정 팝업 -->
<div class="confirm-overlay" id="gistOverlay">
  <div class="confirm-box" style="width:400px;">
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;">🔗 Gist 연동 설정</div>
    <div style="margin-bottom:12px;">
      <label style="font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;">Gist ID</label>
      <input id="gistIdInput" type="text" placeholder="42f3fb231d93bc7c3a0e6da5b229dab6"
        style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);background:#fff;outline:none;">
    </div>
    <div style="margin-bottom:18px;">
      <label style="font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;">Personal Access Token <span style="color:var(--text4);font-weight:400;">(gist 권한)</span></label>
      <input id="gistTokenInput" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
        style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);background:#fff;outline:none;">
      <div style="font-size:11px;color:var(--text4);margin-top:5px;">⚠ 토큰은 이 기기 브라우저에만 저장됩니다.</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn-cancel" onclick="closeGistSettings()">취소</button>
      <button onclick="clearGistSettings()" style="background:#fff;border:1.5px solid var(--border);color:var(--danger);padding:7px 14px;border-radius:6px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;">연결 해제</button>
      <button onclick="saveGistSettings()" style="background:#1d4ed8;border:none;color:#fff;padding:7px 18px;border-radius:6px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;">저장 · 연결 테스트</button>
    </div>
  </div>
</div>

<!-- 확인 팝업 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">취소</button>
      <button id="confirmOkBtn" onclick="confirmOk()">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── 상태 ── */
const SKEY='gfs_v5';
const OLD=['gfs_v4','gfs_v3','gfs_v2'];
const GKEY='gfs_gist_cfg'; // {id, token}
let S={todos:[],issues:[],cs:[],schedules:[],memos:[]};
let pendingAction=null;
let calYear,calMonth;

/* ── 초기화 ── */
async function init(){
  const n=new Date(),dw=['일','월','화','수','목','금','토'];
  document.getElementById('dateBadge').textContent=
    `${n.getFullYear()}.${z(n.getMonth()+1)}.${z(n.getDate())} (${dw[n.getDay()]})`;
  const t=new Date();
  document.getElementById('schedDate').value=`${t.getFullYear()}-${z(t.getMonth()+1)}-${z(t.getDate())}`;

  // 로컬 데이터 먼저 로드
  for(const k of [SKEY,...OLD]){
    try{const v=localStorage.getItem(k);if(v){S={todos:[],issues:[],cs:[],schedules:[],memos:[],...JSON.parse(v)};break;}}catch(e){}
  }
  calYear=t.getFullYear();calMonth=t.getMonth();
  render();renderCalendar();

  // Gist 연결 있으면 최신 데이터 불러오기
  const cfg=gistCfg();
  if(cfg){
    setSyncStatus('ing','⟳ 동기화 중…');
    await gistLoad();
  }
}

/* ── 유틸 ── */
const z=n=>String(n).padStart(2,'0');
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
const today$=()=>{const d=new Date();return `${d.getFullYear()}.${z(d.getMonth()+1)}.${z(d.getDate())}`;};
const save=()=>localStorage.setItem(SKEY,JSON.stringify(S));

/* ── Gist 설정 관리 ── */
const gistCfg=()=>{try{const v=localStorage.getItem(GKEY);return v?JSON.parse(v):null;}catch(e){return null;}};
const gistSave=cfg=>localStorage.setItem(GKEY,JSON.stringify(cfg));

function setSyncStatus(type,msg){
  const el=document.getElementById('syncStatus');
  el.className='sync-badge sync-'+type;
  el.textContent=msg;
}

/* ── Gist 설정 팝업 ── */
function openGistSettings(){
  const cfg=gistCfg();
  if(cfg){
    document.getElementById('gistIdInput').value=cfg.id||'';
    document.getElementById('gistTokenInput').value=cfg.token||'';
  }
  document.getElementById('gistOverlay').classList.add('open');
}
function closeGistSettings(){
  document.getElementById('gistOverlay').classList.remove('open');
}
async function saveGistSettings(){
  const id=document.getElementById('gistIdInput').value.trim();
  const token=document.getElementById('gistTokenInput').value.trim();
  if(!id||!token){showToast('Gist ID와 Token을 모두 입력해주세요');return;}
  gistSave({id,token});
  closeGistSettings();
  setSyncStatus('ing','⟳ 연결 테스트 중…');
  const ok=await gistLoad();
  if(ok) showToast('✓ Gist 연결 성공! 데이터를 불러왔어요');
}
function clearGistSettings(){
  localStorage.removeItem(GKEY);
  closeGistSettings();
  setSyncStatus('none','⚙ Gist 미연결');
  showToast('Gist 연결이 해제됐어요');
}

/* ── Gist API: 불러오기 ── */
async function gistLoad(){
  const cfg=gistCfg();if(!cfg)return false;
  try{
    const res=await fetch(`https://api.github.com/gists/${cfg.id}`,{
      headers:{'Authorization':`token ${cfg.token}`,'Accept':'application/vnd.github.v3+json'}
    });
    if(!res.ok)throw new Error(res.status);
    const data=await res.json();
    const file=data.files['gfs_data.json'];
    if(file&&file.content&&file.content.trim()!=='{}'){
      const remote=JSON.parse(file.content);
      S={todos:[],issues:[],cs:[],schedules:[],memos:[],...remote};
      save();render();renderCalendar();
    }
    setSyncStatus('ok','✓ Gist 연결됨');
    return true;
  }catch(e){
    setSyncStatus('err','✗ 연결 오류');
    showToast('Gist 연결 실패 — 설정을 확인해주세요');
    return false;
  }
}

/* ── Gist API: 저장 ── */
async function gistPush(){
  const cfg=gistCfg();if(!cfg)return false;
  try{
    const res=await fetch(`https://api.github.com/gists/${cfg.id}`,{
      method:'PATCH',
      headers:{'Authorization':`token ${cfg.token}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({files:{'gfs_data.json':{content:JSON.stringify(S,null,2)}}})
    });
    if(!res.ok)throw new Error(res.status);
    setSyncStatus('ok','✓ Gist 동기화됨');
    return true;
  }catch(e){
    setSyncStatus('err','✗ 저장 오류');
    return false;
  }
}

/* ── 저장 + 동기화 ── */
async function saveAll(){
  save(); // 로컬 먼저
  const cfg=gistCfg();
  if(cfg){
    setSyncStatus('ing','⟳ 저장 중…');
    const ok=await gistPush();
    if(ok) showToast('💾 저장 · Gist 동기화 완료 ✓');
    else    showToast('💾 로컬 저장됨 (Gist 오류)');
  }else{
    showToast('💾 로컬 저장됐어요 (Gist 미연결)');
  }
}

/* ── 팝업 ── */
function openConfirm(msg,okClass,action){
  pendingAction=action;
  document.getElementById('confirmMsg').innerHTML=msg;
  const btn=document.getElementById('confirmOkBtn');
  btn.className=okClass;
  btn.textContent=okClass==='btn-ok-danger'?'삭제':'확인';
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){pendingAction=null;document.getElementById('confirmOverlay').classList.remove('open');}
function confirmOk(){if(pendingAction)pendingAction();closeConfirm();}
document.addEventListener('click',e=>{
  if(e.target===document.getElementById('confirmOverlay'))closeConfirm();
  if(e.target===document.getElementById('gistOverlay'))closeGistSettings();
});

/* ── 입력 ── */
function qa(type,e){
  if(e.key!=='Enter')return;
  if(type==='todo'){
    const v=document.getElementById('todoInput').value.trim();if(!v)return;
    S.todos.push({text:v,priority:document.getElementById('todoPri').value,done:false,id:Date.now()});
    document.getElementById('todoInput').value='';
  }else if(type==='issue'){
    const v=document.getElementById('issueInput').value.trim();if(!v)return;
    S.issues.push({title:v,date:today$(),resolved:false,id:Date.now()});
    document.getElementById('issueInput').value='';
  }else if(type==='cs'){
    const v=document.getElementById('csInput').value.trim();if(!v)return;
    S.cs.push({title:v,status:document.getElementById('csStatus').value,date:today$(),id:Date.now()});
    document.getElementById('csInput').value='';
  }else if(type==='sched'){
    const v=document.getElementById('schedInput').value.trim();
    const d=document.getElementById('schedDate').value;
    if(!v||!d){showToast('날짜도 입력해주세요');return;}
    S.schedules.push({title:v,date:d,id:Date.now()});
    document.getElementById('schedInput').value='';
  }
  render();renderCalendar();save();
  // 입력 시 자동 Gist 동기화
  const cfg=gistCfg();
  if(cfg){setSyncStatus('ing','⟳ 저장 중…');gistPush();}
}

function memoKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addMemo();}}
function addMemo(){
  const v=document.getElementById('memoInput').value.trim();if(!v)return;
  const pin=document.getElementById('memoPin').checked;
  S.memos.push({text:v,date:today$(),pin,id:Date.now()});
  document.getElementById('memoInput').value='';
  document.getElementById('memoPin').checked=false;
  render();save();
  const cfg=gistCfg();if(cfg){setSyncStatus('ing','⟳ 저장 중…');gistPush();}
}

/* ── 렌더 ── */function render(){renderTodos();renderUpcoming();renderIssues();renderCS();renderSchedules();renderMemos();}

/* 할 일 패널 하단 — D-2 이내 임박 일정 */
function renderUpcoming(){
  const today=new Date();today.setHours(0,0,0,0);
  const near=S.schedules
    .map(s=>{const t=new Date(s.date);t.setHours(0,0,0,0);return{...s,diff:Math.round((t-today)/86400000)};})
    .filter(s=>s.diff>=0&&s.diff<=2)
    .sort((a,b)=>a.diff-b.diff);

  const section=document.getElementById('upcomingSection');
  const list=document.getElementById('upcomingList');
  list.innerHTML='';

  if(!near.length){section.style.display='none';return;}
  section.style.display='block';

  near.forEach(item=>{
    const cls=item.diff===0?'u-day0':item.diff===1?'u-day1':'u-day2';
    const label=item.diff===0?'D-DAY':item.diff===1?'D-1':'D-2';
    const d=document.createElement('div');d.className=`upcoming-item ${cls}`;
    d.innerHTML=`<span class="u-badge">${label}</span>
      <span class="u-title">${esc(item.title)}</span>
      <span class="u-date">${item.date}</span>`;
    list.appendChild(d);
  });
}

/* ① 할 일 */
function renderTodos(){
  const list=document.getElementById('todoList');list.innerHTML='';
  document.getElementById('todoCnt').textContent=S.todos.filter(i=>!i.done).length;
  if(!S.todos.length){list.innerHTML='<div class="empty">Enter로 바로 추가</div>';return;}
  S.todos.forEach((item,idx)=>{
    const pc=item.priority==='높음'?'t-h':item.priority==='보통'?'t-m':'t-l';
    const d=document.createElement('div');d.className='todo-item';
    d.innerHTML=`<div class="chk ${item.done?'on':''}" onclick="toggleTodo(${idx})"></div>
      <div class="todo-txt ${item.done?'done':''}">${esc(item.text)}</div>
      <span class="ptag ${pc}">${item.priority}</span>
      <button class="x" onclick="askDelTodo(${idx})">✕</button>`;
    list.appendChild(d);
  });
}

/* ② 특이사항 */
function renderIssues(){
  const list=document.getElementById('issueList');list.innerHTML='';
  const today=new Date();today.setHours(0,0,0,0);
  const active=S.issues.filter(i=>!i.resolved);
  document.getElementById('issueCnt').textContent=active.length;
  document.getElementById('issuePulse').style.display=active.length?'block':'none';
  if(!active.length){list.innerHTML='<div class="empty" style="color:#065f46;border-color:#6ee7b7;background:#ecfdf5;">✓ 현재 미해결 항목 없음</div>';return;}
  active.forEach(item=>{
    const idx=S.issues.indexOf(item);
    let age=0;
    try{const p=item.date.split('.');if(p.length===3){const r=new Date(+p[0],+p[1]-1,+p[2]);r.setHours(0,0,0,0);age=Math.floor((today-r)/86400000);}}catch(e){}
    const ageCls=age>=3?'age3':age>=1?'age1':'age0';
    const ageLabel=age===0?'오늘':age===1?'1일째':`${age}일째`;
    const d=document.createElement('div');d.className=`issue-item ${ageCls}`;
    d.innerHTML=`<span class="issue-txt">${esc(item.title)}</span>
      <span class="issue-age">${ageLabel}</span>
      <span class="issue-date">${item.date}</span>
      <button class="resolve-btn" onclick="askResolve(${idx})">✓ 해결</button>
      <button class="x" onclick="askDelIssue(${idx})">✕</button>`;
    list.appendChild(d);
  });
}

/* ③ CS */
function renderCS(){
  const list=document.getElementById('csList');list.innerHTML='';
  document.getElementById('csCnt').textContent=S.cs.length;
  if(!S.cs.length){list.innerHTML='<div class="empty">Enter로 바로 추가</div>';return;}
  S.cs.forEach((item,idx)=>{
    const sc=item.status==='긴급'||item.status==='클레임'?'sr':item.status==='처리중'?'sa':'sg';
    const tc=item.status==='긴급'||item.status==='클레임'?'t-h':item.status==='처리중'?'t-m':'t-l';
    const d=document.createElement('div');d.className='cs-item';
    d.innerHTML=`<div class="sdot ${sc}"></div>
      <span class="cs-txt">${esc(item.title)}</span>
      <span class="ptag ${tc}">${item.status}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-left:4px">${item.date}</span>
      <button class="x" onclick="askDelCS(${idx})">✕</button>`;
    list.appendChild(d);
  });
}

/* ④ 일정 */
function renderSchedules(){
  const list=document.getElementById('schedList');list.innerHTML='';
  const today=new Date();today.setHours(0,0,0,0);
  const sorted=S.schedules
    .map((s,i)=>{const t=new Date(s.date);t.setHours(0,0,0,0);return{...s,diff:Math.round((t-today)/86400000),i};})
    .filter(s=>s.diff>=0).sort((a,b)=>a.diff-b.diff);
  document.getElementById('schedCnt').textContent=sorted.length;
  if(!sorted.length){list.innerHTML='<div class="empty">Enter로 바로 추가</div>';return;}
  sorted.forEach(item=>{
    let dc,dl;
    if(item.diff===0){dc='d0';dl='D-DAY';}
    else if(item.diff===1){dc='d1';dl='D-1';}
    else if(item.diff<=3){dc='d3';dl=`D-${item.diff}`;}
    else if(item.diff<=7){dc='d7';dl=`D-${item.diff}`;}
    else{dc='do';dl=`D-${item.diff}`;}
    const d=document.createElement('div');d.className='sched-item';
    d.innerHTML=`<span class="dbadge ${dc}">${dl}</span>
      <div class="sched-info">
        <div class="sched-title">${esc(item.title)}</div>
        <div class="sched-date">${item.date}</div>
      </div>
      <button class="x" onclick="askDelSched(${item.i})">✕</button>`;
    list.appendChild(d);
  });
}

/* ⑤ 메모 */
function renderMemos(){
  const list=document.getElementById('memoList');list.innerHTML='';
  document.getElementById('memoCnt').textContent=S.memos.length;
  if(!S.memos.length){list.innerHTML='<div class="empty" style="grid-column:1/-1">메모를 입력하세요 (📌 고정 체크 시 상단 고정)</div>';return;}
  const sorted=[...S.memos].sort((a,b)=>(b.pin?1:0)-(a.pin?1:0));
  sorted.forEach(item=>{
    const idx=S.memos.indexOf(item);
    const d=document.createElement('div');d.className=`memo-item ${item.pin?'pin':''}`;
    d.innerHTML=`<button class="x" onclick="askDelMemo(${idx})">✕</button>
      <div class="memo-txt">${esc(item.text)}</div>
      <div class="memo-footer">
        <span class="memo-date">${item.date}</span>
        <button class="pin-btn ${item.pin?'on':''}" onclick="togglePin(${idx})">${item.pin?'📌 고정됨':'📌 고정'}</button>
      </div>`;
    list.appendChild(d);
  });
}

/* ── 달력 ── */
function renderCalendar(){
  const today=new Date();today.setHours(0,0,0,0);
  const yr=calYear,mo=calMonth;
  document.getElementById('calTitle').textContent=`${yr}년 ${mo+1}월`;
  const firstDay=new Date(yr,mo,1).getDay();
  const lastDate=new Date(yr,mo+1,0).getDate();
  const prevLast=new Date(yr,mo,0).getDate();
  const evMap={};
  S.schedules.forEach(s=>{
    const d=new Date(s.date);d.setHours(0,0,0,0);
    const diff=Math.round((d-today)/86400000);
    if(!evMap[s.date])evMap[s.date]=[];
    evMap[s.date].push({title:s.title,diff});
  });
  const body=document.getElementById('calBody');body.innerHTML='';
  const totalCells=Math.ceil((firstDay+lastDate)/7)*7;
  for(let i=0;i<totalCells;i++){
    const cell=document.createElement('div');cell.className='cal-cell';
    let day,dateStr,isOther=false;
    if(i<firstDay){
      day=prevLast-(firstDay-1-i);
      const pm=mo===0?yr-1:yr;const pmm=mo===0?12:mo;
      dateStr=`${pm}-${z(pmm)}-${z(day)}`;isOther=true;
    }else if(i>=firstDay+lastDate){
      day=i-(firstDay+lastDate)+1;
      const nm=mo===11?yr+1:yr;const nmm=mo===11?1:mo+2;
      dateStr=`${nm}-${z(nmm)}-${z(day)}`;isOther=true;
    }else{
      day=i-firstDay+1;dateStr=`${yr}-${z(mo+1)}-${z(day)}`;
    }
    if(isOther)cell.classList.add('other-month');
    const cellDate=new Date(dateStr);cellDate.setHours(0,0,0,0);
    if(cellDate.getTime()===today.getTime())cell.classList.add('today');
    cell.innerHTML=`<div class="cal-day-num">${day}</div>`;
    const evs=evMap[dateStr]||[];
    evs.slice(0,3).forEach(ev=>{
      const span=document.createElement('div');
      const dc=ev.diff===0?'cal-ev-d0':ev.diff===1?'cal-ev-d1':ev.diff<=3?'cal-ev-d3':ev.diff<=7?'cal-ev-d7':'cal-ev-far';
      span.className=`cal-event ${dc}`;span.textContent=ev.title;cell.appendChild(span);
    });
    if(evs.length>3){
      const m=document.createElement('div');
      m.style.cssText='font-size:9px;color:var(--text3);padding:0 5px;font-weight:600;';
      m.textContent=`+${evs.length-3}개 더`;cell.appendChild(m);
    }
    body.appendChild(cell);
  }
}
function calMove(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calGoToday(){const t=new Date();calYear=t.getFullYear();calMonth=t.getMonth();renderCalendar();}

const autoSync=()=>{save();const cfg=gistCfg();if(cfg){setSyncStatus('ing','⟳ 저장 중…');gistPush();}};

/* ── 액션 ── */
function toggleTodo(idx){
  const item=S.todos[idx];
  if(!item.done){
    openConfirm(`<strong>"${esc(item.text)}"</strong><br>완료 처리하시겠습니까?`,'btn-ok-success',()=>{S.todos[idx].done=true;render();autoSync();});
  }else{S.todos[idx].done=false;render();autoSync();}
}
function askDelTodo(idx){openConfirm(`<strong>"${esc(S.todos[idx].text)}"</strong><br>삭제하시겠습니까?`,'btn-ok-danger',()=>{S.todos.splice(idx,1);render();autoSync();});}
function askResolve(idx){openConfirm(`<strong>"${esc(S.issues[idx].title)}"</strong><br>해결 처리하시겠습니까?<br><small style="color:var(--text3)">해결된 항목은 목록에서 제거됩니다.</small>`,'btn-ok-success',()=>{S.issues[idx].resolved=true;render();autoSync();showToast('해결 처리됐어요 ✓');});}
function askDelIssue(idx){openConfirm(`<strong>"${esc(S.issues[idx].title)}"</strong><br>삭제하시겠습니까?<br><small style="color:#b91c1c">⚠ 해결 처리가 아닌 삭제입니다.</small>`,'btn-ok-danger',()=>{S.issues.splice(idx,1);render();autoSync();});}
function askDelCS(idx){openConfirm(`<strong>"${esc(S.cs[idx].title)}"</strong><br>삭제하시겠습니까?`,'btn-ok-danger',()=>{S.cs.splice(idx,1);render();autoSync();});}
function askDelSched(idx){openConfirm(`<strong>"${esc(S.schedules[idx].title)}"</strong><br>일정을 삭제하시겠습니까?`,'btn-ok-danger',()=>{S.schedules.splice(idx,1);render();renderCalendar();autoSync();});}
function askDelMemo(idx){openConfirm(`메모를 삭제하시겠습니까?`,'btn-ok-danger',()=>{S.memos.splice(idx,1);render();autoSync();});}
function togglePin(idx){S.memos[idx].pin=!S.memos[idx].pin;render();autoSync();}

/* ── 단축키 ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeConfirm();closeGistSettings();return;}
  if(e.shiftKey&&e.key==='N'){e.preventDefault();document.getElementById('issueInput').focus();}
  if(e.shiftKey&&e.key==='T'){e.preventDefault();document.getElementById('todoInput').focus();}
  if(e.shiftKey&&e.key==='M'){e.preventDefault();document.getElementById('memoInput').focus();}
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1900);
}

setInterval(()=>{autoSync();},180000);
init();
</script>
